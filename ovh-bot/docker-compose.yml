version: "3.8"

services:
  ovh-bot:
    build: .
    container_name: ovh-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OVH_ENDPOINT=${OVH_ENDPOINT:-ovh-eu}
      - OVH_APPLICATION_KEY=${OVH_APPLICATION_KEY}
      - OVH_APPLICATION_SECRET=${OVH_APPLICATION_SECRET}
      - OVH_CONSUMER_KEY=${OVH_CONSUMER_KEY}
      - OVH_ZONE=${OVH_ZONE:-IE}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_ALLOWED_USERS=${TG_ALLOWED_USERS}
      - TG_CHAT_ID=${TG_CHAT_ID}
    volumes:
      # 固定持久化目录：监控任务保存在 ./data/watch_tasks.json，重建/更新容器不丢
      - ./data:/app/data
    # 也可以用配置文件（二选一，注释掉 environment/env_file 即可）
    #   - ./config.toml:/app/data/config.toml:ro

  # 可选：监控模式
  # ovh-monitor:
  #   build: .
  #   container_name: ovh-monitor
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   command: ["python3", "monitor.py", "26sk10b-v1", "24sk202"]
